<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hana • Summer LMS Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #FAF9F6; }
    .heading { font-family: 'Nunito', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-orange-50 to-rose-50">
  <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Hana Dashboard Link -->
    <a href="hana.html" class="group bg-white rounded-3xl p-8 shadow-sm hover:shadow-xl transition-all border border-orange-100 flex flex-col items-center text-center">
      <div class="w-20 h-20 bg-orange-100 rounded-2xl flex items-center justify-center text-orange-500 mb-6 group-hover:scale-110 transition-transform">
        <i class="fa-solid fa-child-reaching text-4xl"></i>
      </div>
      <h2 class="text-2xl font-black heading text-zinc-900 mb-2">Hana Dashboard</h2>
      <p class="text-zinc-500 text-sm">Góc học tập và rèn luyện thói quen của Hana</p>
    </a>

    <!-- Parents Dashboard Link -->
    <a href="parents.html" class="group bg-white rounded-3xl p-8 shadow-sm hover:shadow-xl transition-all border border-blue-100 flex flex-col items-center text-center">
      <div class="w-20 h-20 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-500 mb-6 group-hover:scale-110 transition-transform">
        <i class="fa-solid fa-user-shield text-4xl"></i>
      </div>
      <h2 class="text-2xl font-black heading text-zinc-900 mb-2">Parents Dashboard</h2>
      <p class="text-zinc-500 text-sm">Cổng quản lý và giám sát dành cho Bố Mẹ</p>
    </a>
  </div>
</body>
</html>
