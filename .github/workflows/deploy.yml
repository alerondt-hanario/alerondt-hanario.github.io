name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Tương tác với Github Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Prepare Files
        run: |
          # Di chuyển các file từ thư mục frontend ra ngoài để build
          # Đổi tên hana.html thành index.html để làm trang chủ
          mv frontend/hana.html frontend/index.html || true
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Chỉ tải lên thư mục frontend
          path: './frontend'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
